<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM TRACKER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #222;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #e8e8e8;
    --muted: #555;
    --card: #161616;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }

  .sync-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .sync-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .sync-dot.error { background: var(--accent2); }
  .sync-dot.loading { background: #888; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: var(--panel);
    padding: 4px;
    border-radius: 4px;
    width: fit-content;
    border: 1px solid var(--border);
  }

  .tab {
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 20px; cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }

  .tab.active { background: var(--accent); color: #000; font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }

  .section { display: none; }
  .section.active { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1/-1; }

  label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  input, select {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 14px; padding: 10px 12px; border-radius: 2px;
    outline: none; transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--panel); }

  .btn {
    background: var(--accent); color: #000; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: 2px; padding: 12px 32px; cursor: pointer;
    border-radius: 2px; transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn.danger {
    background: var(--accent2); font-size: 12px;
    font-family: 'DM Mono', monospace; letter-spacing: 1px; padding: 6px 14px;
  }

  .sets-container { margin-top: 12px; }

  .set-row {
    display: grid; grid-template-columns: 40px 1fr 1fr auto;
    gap: 10px; align-items: center; margin-bottom: 8px;
  }

  .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); text-align: center; }

  .add-set {
    background: none; border: 1px dashed var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; padding: 10px; cursor: pointer; border-radius: 2px;
    width: 100%; transition: all 0.15s; margin-top: 8px;
  }

  .add-set:hover { border-color: var(--accent); color: var(--accent); }

  .history-filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .history-filters select { min-width: 200px; }

  .log-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 4px;
    padding: 16px 20px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }

  .log-card:hover { border-color: #333; }
  .log-left { display: flex; align-items: center; gap: 20px; }
  .log-date { font-size: 11px; color: var(--muted); letter-spacing: 1px; min-width: 90px; }

  .log-exname {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    color: var(--accent); letter-spacing: 1px;
  }

  .log-sets { display: flex; gap: 8px; flex-wrap: wrap; }

  .set-badge {
    background: var(--panel); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 2px; font-size: 12px; color: var(--text);
  }

  .progress-controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media (max-width: 700px) {
    .charts-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .set-row { grid-template-columns: 30px 1fr 1fr auto; }
  }

  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px;
  }

  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 4px; }
  .chart-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }

  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 16px; }

  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  }

  .empty span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--border); margin-bottom: 8px; letter-spacing: 4px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; padding: 12px 28px; border-radius: 2px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999;
  }

  .toast.error { background: var(--accent2); color: #fff; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .pr-badge {
    background: var(--accent); color: #000; font-size: 9px;
    letter-spacing: 1px; padding: 2px 6px; border-radius: 2px;
    font-weight: 500; vertical-align: middle; margin-left: 6px;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>
    <div class="subtitle">Sincronizado en la nube ☁️</div>
    <h1>GYM<br>TRACKER</h1>
  </div>
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncText">Conectando...</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('registro', this)">REGISTRAR</button>
  <button class="tab" onclick="showTab('historial', this)">HISTORIAL</button>
  <button class="tab" onclick="showTab('progreso', this)">PROGRESO</button>
</div>

<!-- REGISTRO -->
<div id="registro" class="section active">
  <div class="form-grid">
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="fecha">
    </div>
    <div class="field">
      <label>Ejercicio</label>
      <select id="ejercicio">
        <option value="">Selecciona...</option>
        <option>Press Banca</option>
        <option>Sentadilla</option>
        <option>Peso Muerto</option>
        <option>Press Militar</option>
        <option>Remo con Barra</option>
        <option>Dominadas</option>
        <option>Curl Bíceps</option>
        <option>Extensión Tríceps</option>
        <option>Hip Thrust</option>
        <option>Zancadas</option>
        <option>Press Inclinado</option>
        <option>Aperturas</option>
        <option>Jalón Polea</option>
        <option>Face Pull</option>
        <option>Elevaciones Laterales</option>
        <option>Curl Martillo</option>
        <option>Fondos</option>
        <option>Peso Muerto Rumano</option>
      </select>
    </div>
    <div class="field full">
      <label>Ejercicio personalizado (opcional)</label>
      <input type="text" id="ejercicioCustom" placeholder="Escribe un ejercicio no listado...">
    </div>
  </div>

  <div class="sets-container">
    <label>Series</label>
    <div id="sets-list" style="margin-top:12px"></div>
    <button class="add-set" onclick="addSet()">+ AÑADIR SERIE</button>
  </div>

  <div style="margin-top:24px">
    <button class="btn" id="btnGuardar" onclick="guardarEntrenamiento()">GUARDAR SESIÓN</button>
  </div>
</div>

<!-- HISTORIAL -->
<div id="historial" class="section">
  <div class="history-filters">
    <div class="field">
      <label>Filtrar ejercicio</label>
      <select id="filtroEjercicio" onchange="renderHistorial()">
        <option value="">Todos los ejercicios</option>
      </select>
    </div>
  </div>
  <div id="historial-list"></div>
</div>

<!-- PROGRESO -->
<div id="progreso" class="section">
  <div class="progress-controls">
    <div class="field">
      <label>Ejercicio</label>
      <select id="progresoEjercicio" onchange="renderProgreso()">
        <option value="">Selecciona un ejercicio</option>
      </select>
    </div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="charts-grid" id="charts-area"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://hydxjopgwdflvsonntmy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5ZHhqb3Bnd2RmbHZzb25udG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTYzNzYsImV4cCI6MjA4OTc3MjM3Nn0.d89QYaKYKELuyJ280sJuBqt4gX4727l3lja4KPjTiMc';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let cachedData = [];

async function loadData() {
  setSyncStatus('loading', 'Cargando...');
  const { data, error } = await db
    .from('entrenamientos')
    .select('*')
    .order('fecha', { ascending: false });

  if (error) {
    setSyncStatus('error', 'Error de conexión');
    showToast('Error al cargar datos', true);
    return [];
  }

  setSyncStatus('ok', 'Sincronizado');
  cachedData = data || [];
  return cachedData;
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

// ─── SETS ─────────────────────────────────────────────────────────────────────
let numSets = 0;

function addSet() {
  numSets++;
  const list = document.getElementById('sets-list');
  const row = document.createElement('div');
  row.className = 'set-row';
  row.id = `set-${numSets}`;
  row.innerHTML = `
    <div class="set-num">${numSets}</div>
    <input type="number" min="0" step="0.5" placeholder="Kg">
    <input type="number" min="0" step="1" placeholder="Reps">
    <button class="btn danger" onclick="removeSet(${numSets})">✕</button>
  `;
  list.appendChild(row);
}

function removeSet(id) {
  const el = document.getElementById(`set-${id}`);
  if (el) el.remove();
  renumberSets();
}

function renumberSets() {
  document.querySelectorAll('.set-row').forEach((r, i) => {
    r.querySelector('.set-num').textContent = i + 1;
  });
}

function clearSets() {
  document.getElementById('sets-list').innerHTML = '';
  numSets = 0;
}

// ─── GUARDAR ──────────────────────────────────────────────────────────────────
async function guardarEntrenamiento() {
  const fecha = document.getElementById('fecha').value;
  const ejercicioSel = document.getElementById('ejercicio').value;
  const ejercicioCustom = document.getElementById('ejercicioCustom').value.trim();
  const ejercicio = ejercicioCustom || ejercicioSel;

  if (!fecha || !ejercicio) { showToast('Rellena fecha y ejercicio', true); return; }

  const rows = document.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const kg = parseFloat(inputs[0].value);
    const reps = parseInt(inputs[1].value);
    if (!isNaN(kg) && !isNaN(reps) && reps > 0) sets.push({ kg, reps });
  });

  if (sets.length === 0) { showToast('Añade al menos una serie válida', true); return; }

  const btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>GUARDANDO...';
  setSyncStatus('loading', 'Guardando...');

  const { error } = await db.from('entrenamientos').insert([{ fecha, ejercicio, sets }]);

  btn.disabled = false;
  btn.innerHTML = 'GUARDAR SESIÓN';

  if (error) {
    setSyncStatus('error', 'Error al guardar');
    showToast('Error al guardar', true);
    return;
  }

  setSyncStatus('ok', 'Sincronizado');
  showToast('¡Sesión guardada!');
  clearSets();
  document.getElementById('ejercicio').value = '';
  document.getElementById('ejercicioCustom').value = '';
  addSet(); addSet(); addSet();
  await loadData();
  updateSelects();
}

// ─── HISTORIAL ────────────────────────────────────────────────────────────────
async function renderHistorial() {
  const el = document.getElementById('historial-list');
  el.innerHTML = `<div class="empty"><span class="spinner"></span></div>`;

  const filtro = document.getElementById('filtroEjercicio').value;
  await loadData();

  const data = cachedData.filter(d => !filtro || d.ejercicio === filtro);

  if (data.length === 0) {
    el.innerHTML = `<div class="empty"><span>VACÍO</span>Sin registros aún</div>`;
    return;
  }

  const prs = getPRs();

  el.innerHTML = data.map(entry => {
    const maxKg = Math.max(...entry.sets.map(s => s.kg));
    const isPR = prs[entry.ejercicio] && prs[entry.ejercicio].kg === maxKg && prs[entry.ejercicio].fecha === entry.fecha;
    const setBadges = entry.sets.map(s => `<span class="set-badge">${s.kg}kg × ${s.reps}</span>`).join('');
    return `
      <div class="log-card">
        <div class="log-left">
          <div class="log-date">${formatDate(entry.fecha)}</div>
          <div>
            <div class="log-exname">${entry.ejercicio}${isPR ? '<span class="pr-badge">PR</span>' : ''}</div>
            <div class="log-sets" style="margin-top:6px">${setBadges}</div>
          </div>
        </div>
        <button class="btn danger" onclick="borrarEntrada(${entry.id})">✕</button>
      </div>
    `;
  }).join('');
}

async function borrarEntrada(id) {
  setSyncStatus('loading', 'Borrando...');
  const { error } = await db.from('entrenamientos').delete().eq('id', id);
  if (error) { showToast('Error al borrar', true); return; }
  showToast('Entrada borrada');
  await loadData();
  updateSelects();
  renderHistorial();
}

// ─── PROGRESO ─────────────────────────────────────────────────────────────────
let charts = {};

async function renderProgreso() {
  const ejercicio = document.getElementById('progresoEjercicio').value;
  const statsEl = document.getElementById('stats-row');
  const chartsEl = document.getElementById('charts-area');

  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  if (!ejercicio) {
    statsEl.innerHTML = '';
    chartsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><span>📊</span>Selecciona un ejercicio</div>`;
    return;
  }

  chartsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="spinner"></span></div>`;
  await loadData();

  const data = cachedData
    .filter(d => d.ejercicio === ejercicio)
    .sort((a, b) => a.fecha.localeCompare(b.fecha));

  if (data.length === 0) {
    statsEl.innerHTML = '';
    chartsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><span>VACÍO</span>Sin datos para este ejercicio</div>`;
    return;
  }

  const labels = data.map(d => formatDate(d.fecha));
  const maxKgs = data.map(d => Math.max(...d.sets.map(s => s.kg)));
  const avgKgs = data.map(d => +(d.sets.reduce((a, s) => a + s.kg, 0) / d.sets.length).toFixed(1));
  const totalReps = data.map(d => d.sets.reduce((a, s) => a + s.reps, 0));
  const maxReps = data.map(d => Math.max(...d.sets.map(s => s.reps)));
  const volumes = data.map(d => d.sets.reduce((a, s) => a + s.kg * s.reps, 0));

  const prKg = Math.max(...maxKgs);
  const mejora = maxKgs.length > 1 ? (maxKgs[maxKgs.length - 1] - maxKgs[0]).toFixed(1) : 0;

  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${prKg}<small style="font-size:18px;color:var(--muted)">kg</small></div>
      <div class="stat-label">Récord Personal</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${data.length}</div>
      <div class="stat-label">Sesiones</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${mejora >= 0 ? 'var(--accent)' : 'var(--accent2)'}">
        ${mejora >= 0 ? '+' : ''}${mejora}<small style="font-size:18px;color:var(--muted)">kg</small>
      </div>
      <div class="stat-label">Progreso Total</div>
    </div>
  `;

  chartsEl.innerHTML = `
    <div class="chart-card"><div class="chart-title">Peso Máximo</div><div class="chart-sub">kg por sesión</div><canvas id="chartPeso"></canvas></div>
    <div class="chart-card"><div class="chart-title">Repeticiones</div><div class="chart-sub">totales y máximo por sesión</div><canvas id="chartReps"></canvas></div>
    <div class="chart-card"><div class="chart-title">Volumen Total</div><div class="chart-sub">kg × reps</div><canvas id="chartVol"></canvas></div>
    <div class="chart-card"><div class="chart-title">Peso Medio</div><div class="chart-sub">kg medio por serie</div><canvas id="chartAvg"></canvas></div>
  `;

  const base = {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: '#1a1a1a' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } } },
      y: { grid: { color: '#1a1a1a' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } } }
    }
  };

  charts.peso = new Chart(document.getElementById('chartPeso'), {
    type: 'line',
    data: { labels, datasets: [{ data: maxKgs, borderColor: '#c8f135', backgroundColor: 'rgba(200,241,53,0.08)', pointBackgroundColor: '#c8f135', pointRadius: 5, tension: 0.3, fill: true }] },
    options: base
  });

  charts.reps = new Chart(document.getElementById('chartReps'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Total reps', data: totalReps, backgroundColor: 'rgba(200,241,53,0.5)', borderColor: '#c8f135', borderWidth: 1 },
      { label: 'Máx reps/serie', data: maxReps, backgroundColor: 'rgba(255,77,77,0.5)', borderColor: '#ff4d4d', borderWidth: 1 }
    ]},
    options: { ...base, plugins: { legend: { display: true, labels: { color: '#555', font: { family: 'DM Mono', size: 10 } } } } }
  });

  charts.vol = new Chart(document.getElementById('chartVol'), {
    type: 'line',
    data: { labels, datasets: [{ data: volumes, borderColor: '#ff4d4d', backgroundColor: 'rgba(255,77,77,0.08)', pointBackgroundColor: '#ff4d4d', pointRadius: 5, tension: 0.3, fill: true }] },
    options: base
  });

  charts.avg = new Chart(document.getElementById('chartAvg'), {
    type: 'line',
    data: { labels, datasets: [{ data: avgKgs, borderColor: '#888', backgroundColor: 'rgba(136,136,136,0.05)', pointBackgroundColor: '#888', pointRadius: 5, tension: 0.3, fill: true, borderDash: [4,4] }] },
    options: base
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getPRs() {
  const prs = {};
  cachedData.forEach(entry => {
    const maxKg = Math.max(...entry.sets.map(s => s.kg));
    if (!prs[entry.ejercicio] || maxKg > prs[entry.ejercicio].kg) {
      prs[entry.ejercicio] = { kg: maxKg, fecha: entry.fecha };
    }
  });
  return prs;
}

function updateSelects() {
  const ejercicios = [...new Set(cachedData.map(d => d.ejercicio))].sort();
  ['filtroEjercicio', 'progresoEjercicio'].forEach((id, i) => {
    const el = document.getElementById(id);
    const val = el.value;
    el.innerHTML = `<option value="">${i === 0 ? 'Todos los ejercicios' : 'Selecciona un ejercicio'}</option>`;
    ejercicios.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e; opt.textContent = e;
      el.appendChild(opt);
    });
    el.value = val;
  });
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');
  if (name === 'historial') renderHistorial();
  if (name === 'progreso') renderProgreso();
}

document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
addSet(); addSet(); addSet();
loadData().then(updateSelects);
</script>
